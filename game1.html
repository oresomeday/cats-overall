            ).join('')}</div>${passButtonHTML()}`);
        const startId = setTimeout(spawnMole, 500);
        G.fallIntervals.push(startId);
        startTimer(getTimeForRound() + 3000, () => { if (!G.answered) handleWrong(); });
    }

    // ====== ミニゲーム12: スロット ======
    function miniGame_slot() {
        G.miniType = '🎰 スロット'; updateHUD();
        const targetIdx = Math.floor(Math.random() * TARGET_CHARS.length);
        const targetChar = TARGET_CHARS[targetIdx];
        const reelChars = shuffle([...TARGET_CHARS, ...DECOY_CHARS.slice(0, 6)]);
        let spinning = true, currentCharIdx = 0, spinInterval;
        function updateReel() {
            const reel = document.getElementById('slot-main');
            if (!reel) return;
            currentCharIdx = (currentCharIdx + 1) % reelChars.length;
            reel.textContent = reelChars[currentCharIdx];
        }
        window.stopSlot = function() {
            if (G.answered || !spinning) return;
            spinning = false; clearInterval(spinInterval);
            const reel = document.getElementById('slot-main');
            if (!reel) return; reel.classList.remove('spinning');
            if (reelChars[currentCharIdx] === targetChar) {
                reel.classList.add('stopped'); handleCorrect();
            } else { reel.classList.add('wrong-stop'); handleWrong(); }
        };
        const prevChar = targetIdx > 0 ? TARGET_CHARS[targetIdx - 1] : '　';
        const nextChar = targetIdx < TARGET_CHARS.length - 1 ? TARGET_CHARS[targetIdx + 1] : '　';
        render(`<div class="mini-label">🎰 スロット</div>
            <div class="question-text">「<em>${TARGET}</em>」の<br>
            <span class="highlight">${targetIdx + 1}文字目「${targetChar}」</span>で止めろ！</div>
            <div class="slot-container">
                <div class="slot-reel" style="opacity:0.4;">${prevChar}</div>
                <div class="slot-reel spinning" id="slot-main">${reelChars[0]}</div>
                <div class="slot-reel" style="opacity:0.4;">${nextChar}</div>
            </div>
            <div class="button-container">
                <button class="game-btn btn-correct" onclick="stopSlot()" style="font-size:1.5em;padding:20px 60px;">⏹ STOP</button>
            </div>${passButtonHTML()}`);
        spinInterval = setInterval(updateReel, 80);
        G.fallIntervals.push(spinInterval);
        startTimer(getTimeForRound() + 2000, () => {
            clearInterval(spinInterval); if (!G.answered) handleWrong();
        });
    }

    // ====== ミニゲーム13: 文字カウント ======
    function miniGame_count() {
        G.miniType = '🔢 文字カウント'; updateHUD();
        const tc = pick(TARGET_CHARS);
        const total = 16 + Math.floor(Math.random() * 9);
        const correctCount = 2 + Math.floor(Math.random() * 4);
        let chars = [];
        for (let i = 0; i < correctCount; i++) chars.push(tc);
        const decoys = DECOY_CHARS.filter(c => c !== tc);
        for (let i = 0; i < total - correctCount; i++) chars.push(pick(decoys));
        chars = shuffle(chars);
        const options = new Set([correctCount]);
        while (options.size < 4) {
            const v = correctCount + (Math.floor(Math.random() * 5) - 2);
            if (v > 0) options.add(v);
        }
        const sortedOpts = shuffle([...options]);
        window.countAnswer = function(v) {
            if (G.answered) return;
            v === correctCount ? handleCorrect() : handleWrong();
        };
        render(`<div class="mini-label">🔢 文字カウント</div>
            <div class="question-text">「<em>${TARGET}</em>」の
            「<span class="highlight">${tc}</span>」は何個？</div>
            <div class="count-area">${chars.map(c =>
                `<div class="count-char">${c}</div>`
            ).join('')}</div>
            <div class="count-choices">${sortedOpts.map(v =>
                `<button class="count-choice" onclick="countAnswer(${v})">${v}</button>`
            ).join('')}</div>${passButtonHTML()}`);
        startTimer(getTimeForRound() + 2000, () => handleWrong());
    }

    // ====== ミニゲーム14: タイピング ======
    function miniGame_typing() {
        G.miniType = '⌨️ タイピング'; updateHUD();
        let ci = 0;
        const decoyCount = Math.max(4, 12 - TARGET_CHARS.length);
        const decoys = shuffle(DECOY_CHARS).slice(0, decoyCount);
        const keys = shuffle([...TARGET_CHARS, ...decoys]);
        function renderTyping() {
            let display = TARGET_CHARS.map((c, i) => {
                if (i < ci) return `<span class="typed">${c}</span>`;
                if (i === ci) return `<span class="cursor-char">${c}</span>`;
                return `<span class="untyped">${c}</span>`;
            }).join('');
            render(`<div class="mini-label">⌨️ タイピング</div>
                <div class="question-text">「<em>${TARGET}</em>」を打て！</div>
                <div class="typing-display">${display}</div>
                <div class="typing-keys">${keys.map(k =>
                    `<button class="typing-key" onclick="typeKey('${k}')">${k}</button>`
                ).join('')}</div>${passButtonHTML()}`);
        }
        window.typeKey = function(k) {
            if (G.answered) return;
            if (k === TARGET_CHARS[ci]) {
                ci++;
                if (ci >= TARGET_CHARS.length) handleCorrect(); else renderTyping();
            } else handleWrong();
        };
        renderTyping();
        startTimer(getTimeForRound() + 2000, () => handleWrong());
    }

    // ====== ミニゲーム15: 表記チェック（自動生成）======
    function miniGame_spellCheck() {
        G.miniType = '🪞 表記チェック'; updateHUD();
        const v = generateSpellVariant();
        window.spellAnswer = function(ans) {
            if (G.answered) return;
            ans === v.correct ? handleCorrect() : handleWrong();
        };
        render(`<div class="mini-label">🪞 表記チェック</div>
            <div class="question-text">この表記は正しい？</div>
            <div class="mirror-text">${v.text}</div>
            <div class="button-container">
                <button class="game-btn btn-correct" onclick="spellAnswer(true)" style="font-size:1.5em;padding:18px 45px;">⭕ 正しい</button>
                <button class="game-btn btn-wrong" onclick="spellAnswer(false)" style="font-size:1.5em;padding:18px 45px;">✖ 違う</button>
            </div>${passButtonHTML()}`);
        startTimer(getTimeForRound(), () => handleWrong());
    }

    // ====== ミニゲーム16: チェーン探し ======
    function miniGame_chainFind() {
        G.miniType = '🔗 チェーン探し'; updateHUD();
        const len = TARGET_CHARS.length;
        const before = Math.floor(Math.random() * 4);
        const after = Math.floor(Math.random() * 4);
        let chain = [];
        for (let i = 0; i < before; i++) chain.push(pick(DECOY_CHARS));
        const startIdx = chain.length;
        chain.push(...TARGET_CHARS);
        for (let i = 0; i < after; i++) chain.push(pick(DECOY_CHARS));
        let tappedCount = 0, tappedSet = new Set();
        window.chainTap = function(idx) {
            if (G.answered) return;
            if (idx >= startIdx && idx < startIdx + len && !tappedSet.has(idx)) {
                tappedSet.add(idx);
                document.getElementById('chain-' + idx)?.classList.add('found');
                tappedCount++;
                if (tappedCount >= len) handleCorrect();
            } else if (!tappedSet.has(idx)) handleWrong();
        };
        render(`<div class="mini-label">🔗 チェーン探し</div>
            <div class="question-text">文字列の中から<br>
            「<em>${TARGET}</em>」を全部タップ！</div>
            <div class="chain-display">${chain.map((c, i) =>
                `<div class="chain-char" id="chain-${i}" onclick="chainTap(${i})">${c}</div>`
            ).join('')}</div>${passButtonHTML()}`);
        startTimer(getTimeForRound() + 2000, () => handleWrong());
    }

    // ====== ミニゲーム17: 連打チャレンジ ======
    function miniGame_rapidTap() {
        G.miniType = '💥 連打チャレンジ'; updateHUD();
        const tc = pick(TARGET_CHARS);
        const goal = 8 + Math.min(Math.floor(G.round / 3), 12);
        let count = 0;
        window.rapidTap = function() {
            if (G.answered) return; count++;
            const counter = document.getElementById('rapid-count');
            if (counter) counter.textContent = count;
            const prog = document.getElementById('rapid-prog');
            if (prog) prog.style.width = Math.min(100, count / goal * 100) + '%';
            if (count >= goal) handleCorrect();
        };
        render(`<div class="mini-label">💥 連打チャレンジ</div>
            <div class="question-text">「<em>${TARGET}</em>」の
            「<span class="highlight">${tc}</span>」を<br>${goal}回連打しろ！</div>
            <div class="tap-counter"><span id="rapid-count">0</span> / ${goal}</div>
            <div style="width:80%;max-width:280px;height:16px;background:#222;border-radius:8px;overflow:hidden;margin:10px 0;border:2px solid #444;">
                <div id="rapid-prog" style="height:100%;width:0%;background:linear-gradient(90deg,#6600ff,#00ccff);border-radius:6px;transition:width 0.1s;"></div>
            </div>
            <button class="tap-target-btn" onclick="rapidTap()">${tc}</button>
            ${passButtonHTML()}`);
        startTimer(getTimeForRound() + 1000, () => handleWrong());
    }

    // ====== ミニゲーム18: 逆順タップ ======
    function miniGame_reverse() {
        G.miniType = '🔄 逆順タップ'; updateHUD();
        const reversed = [...TARGET_CHARS].reverse();
        const reverseHint = reversed.join('→');
        let ci = 0;
        const decoyCount = Math.max(4, 16 - TARGET_CHARS.length);
        const decoys = shuffle(DECOY_CHARS).slice(0, decoyCount);
        let cells = shuffle([...TARGET_CHARS, ...decoys]);
        let doneSet = new Set();
        function renderRev() {
            let o = reversed.map((ch, i) =>
                i < ci ? `<span class="done">${ch}</span>` :
                i === ci ? `<span class="current">${ch}</span>` :
                `<span class="remaining">${ch}</span>`
            ).join(' ');
            const cols = Math.min(4, Math.max(3, Math.ceil(Math.sqrt(cells.length))));
            render(`<div class="mini-label">🔄 逆順タップ</div>
                <div class="question-text">「<em>${TARGET}</em>」を
                <span class="highlight">逆から</span>タップ！<br>
                <small>${reverseHint}</small></div>
                <div class="order-display">${o}</div>
                <div class="char-grid" style="grid-template-columns:repeat(${cols},1fr);">
                ${cells.map((c, i) =>
                    `<div class="char-cell ${doneSet.has(i) ? 'correct' : ''}" onclick="revTap(${i})">${c}</div>`
                ).join('')}</div>${passButtonHTML()}`);
        }
        window.revTap = function(idx) {
            if (G.answered || doneSet.has(idx)) return;
            if (cells[idx] === reversed[ci]) {
                doneSet.add(idx); ci++;
                if (ci >= reversed.length) handleCorrect(); else renderRev();
            } else handleWrong();
        };
        renderRev();
        startTimer(getTimeForRound() + 2000, () => handleWrong());
    }

    // ====== ミニゲーム19: 消灯パズル ======
    function miniGame_lightsOut() {
        G.miniType = '💡 消灯パズル'; updateHUD();
        const len = TARGET_CHARS.length;
        let lights = Array(len).fill(true);
        const clicks = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < clicks; i++) {
            const idx = Math.floor(Math.random() * len);
            lights[idx] = !lights[idx];
            if (idx > 0) lights[idx - 1] = !lights[idx - 1];
            if (idx < len - 1) lights[idx + 1] = !lights[idx + 1];
        }
        if (lights.every(l => !l)) { lights[0] = true; lights[1] = true; }
        window.lightTap = function(idx) {
            if (G.answered) return;
            lights[idx] = !lights[idx];
            if (idx > 0) lights[idx - 1] = !lights[idx - 1];
            if (idx < len - 1) lights[idx + 1] = !lights[idx + 1];
            renderLights();
            if (lights.every(l => !l)) handleCorrect();
        };
        function renderLights() {
            const cellSize = len <= 6 ? 'width:52px;height:60px;' : 'width:42px;height:50px;';
            render(`<div class="mini-label">💡 消灯パズル</div>
                <div class="question-text">「<em>${TARGET}</em>」の灯りを<br>
                全部消せ！（隣も切り替わる）</div>
                <div style="display:flex;gap:6px;margin:20px 0;flex-wrap:wrap;justify-content:center;">
                ${TARGET_CHARS.map((c, i) =>
                    `<div class="char-cell" onclick="lightTap(${i})"
                        style="${cellSize}aspect-ratio:auto;font-size:1.5em;
                        ${lights[i]
                            ? 'border-color:#ffcc00;background:linear-gradient(145deg,#443300,#332200);box-shadow:0 0 20px rgba(255,200,0,0.5);color:#ffcc00;'
                            : 'border-color:#222;background:#111;color:#333;'
                        }">${c}</div>`
                ).join('')}</div>${passButtonHTML()}`);
        }
        renderLights();
        startTimer(getTimeForRound() + 4000, () => handleWrong());
    }

    // ====== ミニゲーム20: 影文字クイズ ======
    function miniGame_shadow() {
        G.miniType = '👤 影文字クイズ'; updateHUD();
        const idx = Math.floor(Math.random() * TARGET_CHARS.length);
        const correct = TARGET_CHARS[idx];
        const decoys = shuffle(DECOY_CHARS.filter(c => c !== correct)).slice(0, 3);
        const choices = shuffle([correct, ...decoys]);
        window.shadowAnswer = function(ch) {
            if (G.answered) return;
            ch === correct ? handleCorrect() : handleWrong();
        };
        render(`<div class="mini-label">👤 影文字クイズ</div>
            <div class="question-text">「<em>${TARGET}</em>」の${idx + 1}文字目<br>
            ぼやけた文字は何？</div>
            <div style="font-size:5em;font-weight:900;color:#444;text-shadow:0 0 25px #6600ff;
                filter:blur(6px);margin:20px 0;pointer-events:none;">${correct}</div>
            <div class="quiz-choices">${choices.map(c =>
                `<button class="quiz-choice" onclick="shadowAnswer('${c}')">${c}</button>`
            ).join('')}</div>${passButtonHTML()}`);
        startTimer(getTimeForRound(), () => handleWrong());
    }

    // ============================================================
    // ミニゲーム配列
    // ============================================================
    const miniGames = [
        miniGame_fillBlank, miniGame_findChar, miniGame_orderTap, miniGame_trueFalse,
        miniGame_bubbleTap, miniGame_quiz4, miniGame_fallCatch, miniGame_reflexTap,
        miniGame_swipe, miniGame_memory, miniGame_whackMole, miniGame_slot,
        miniGame_count, miniGame_typing, miniGame_spellCheck, miniGame_chainFind,
        miniGame_rapidTap, miniGame_reverse, miniGame_lightsOut, miniGame_shadow,
    ];

    function playRound() {
        let available = miniGames.filter((_, i) => i !== G.lastMiniIdx);
        if (available.length === 0) available = miniGames;
        const game = pick(available);
        G.lastMiniIdx = miniGames.indexOf(game);
        game();
    }

    // ============================================================
    // 結果画面
    // ============================================================
    function endGame() {
        stopTimer(); clearFallIntervals();

        const isCleared = G.round >= CLEAR_ROUND;
        const isNew = G.score > highScore;

        if (isNew) {
            highScore = G.score;
            localStorage.setItem(STORAGE_KEY, highScore);
            document.getElementById('best-score').textContent = highScore.toLocaleString();
        }

        if (isCleared) {
            localStorage.setItem('gameClear_' + GAME_NUMBER, 'true');
        }

        const result = document.getElementById('result');
        const auroraEl = document.getElementById('result-aurora');

        if (isCleared) {
            result.className = 'screen clear-bg';
            auroraEl.className = 'result-aurora clear-aurora';
        } else {
            result.className = 'screen lose-bg';
            auroraEl.className = 'result-aurora lose-aurora';
        }

        document.getElementById('result-content').innerHTML = `
            ${isCleared ? '<div class="clear-badge">🎯 STAGE CLEAR!</div>' : ''}
            ${isNew ? '<div class="highscore-badge">🎉 NEW HIGH SCORE!</div>' : ''}
            <div class="result-icon-container">
                <div class="icon-ring ${isCleared ? 'clear-ring' : ''}"></div>
                <div class="result-icon">${isCleared ? '🏆' : (isNew ? '⭐' : THEME_ICON)}</div>
            </div>
            <div class="result-title ${isCleared ? 'title-clear' : 'title-lose'}">
                ${isCleared ? 'GAME CLEAR!' : 'GAME OVER'}
            </div>
            <div class="result-score-box">
                <div class="result-score-label">Total Score</div>
                <div class="result-score-value" id="score-counter">0</div>
            </div>
            <div class="result-stats">
                <div class="stat-row"><span>🎯 到達ラウンド</span><span class="stat-value ${isCleared ? 'green' : 'cyan'}">${G.round}</span></div>
                <div class="stat-row"><span>🔥 最大コンボ</span><span class="stat-value gold">${G.maxCombo}</span></div>
                <div class="stat-row"><span>⏭ パス使用</span><span class="stat-value gray">${G.passUsed} / ${G.maxPass}</span></div>
                <div class="stat-row"><span>🏆 ハイスコア</span><span class="stat-value pink">${highScore.toLocaleString()}</span></div>
            </div>
            ${isCleared ? `
                <div class="result-buttons">
                    <button class="btn btn-green" onclick="goBack()">✨ ステージ選択へ</button>
                    <button class="btn btn-cyan btn-small" onclick="startGame()">🔄 もう一度</button>
                </div>
                <div class="redirect-msg">3秒後にメニューへ戻ります...</div>
            ` : `
                <div class="result-buttons">
                    <button class="btn" onclick="startGame()">🔄 RETRY</button>
                    <button class="btn btn-cyan btn-small" onclick="showScreen('title')">🏠 TITLE</button>
                </div>
            `}
        `;

        showScreen('result');

        // スコアカウントアップ
        let cur = 0;
        const target = G.score, step = target / (1500 / 16);
        const counter = document.getElementById('score-counter');
        const cu = setInterval(() => {
            cur += step;
            if (cur >= target) { cur = target; clearInterval(cu); }
            counter.textContent = Math.floor(cur).toLocaleString();
        }, 16);

        // 演出
        if (isCleared || isNew) {
            createConfetti();
            createStars();
        }

        // クリア時は自動でメニューへ
        if (isCleared) {
            setTimeout(goBack, 3000);
        }
    }
    </script>
</body>
</html>
