<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
}
body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #0a0a1a;
    min-height: 100vh;
    overflow: hidden;
    touch-action: manipulation;
}

.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background: linear-gradient(180deg, #6c0000, #8b0000);
    border: 2px solid #ff3030;
    color: #fff;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 15px rgba(139,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.back-btn:active { transform: scale(0.9); }

#game {
    width: 100vw;
    height: 100vh;
    max-width: 500px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
}
.screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 15px;
    position: absolute;
    top: 0;
    left: 0;
}
.screen.active { display: flex; }

/* ========== タイトル画面 ========== */
#title {
    background: #000;
    position: relative;
    overflow: hidden;
}

.bg-effects {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
}

.cyber-grid {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    animation: gridMove 20s linear infinite;
}
@keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 30px 30px; }
}

.aurora {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
        radial-gradient(ellipse at 20% 20%, rgba(255,0,128,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(0,255,255,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(128,0,255,0.3) 0%, transparent 50%);
    animation: auroraShift 8s ease-in-out infinite;
}
@keyframes auroraShift {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
}

.particles {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
}
.particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp 10s infinite;
    opacity: 0;
}
@keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

.scanlines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
    );
}

.title-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%; height: 100%;
    padding: 20px;
}

.title-logo {
    text-align: center;
    margin-bottom: auto;
    padding-top: 15vh;
}

.title-icon {
    font-size: 4.5em;
    display: block;
    margin-bottom: 15px;
    animation: iconFloat 3s ease-in-out infinite, iconGlow 2s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.8));
}
@keyframes iconFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}
@keyframes iconGlow {
    from { filter: drop-shadow(0 0 30px rgba(255,0,255,0.8)); }
    to { filter: drop-shadow(0 0 50px rgba(0,255,255,0.8)); }
}

.title-text {
    font-size: 2.5em;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #fff;
    text-shadow:
        0 0 10px #fff, 0 0 20px #fff,
        0 0 40px #ff00ff, 0 0 80px #ff00ff;
    animation: textPulse 2s ease-in-out infinite;
}
@keyframes textPulse {
    0%, 100% {
        text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 80px #ff00ff;
    }
    50% {
        text-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 60px #00ffff, 0 0 100px #00ffff;
    }
}

.title-sub {
    font-size: 1em;
    color: #0ff;
    letter-spacing: 0.5em;
    margin-top: 10px;
    text-shadow: 0 0 20px #0ff;
}

.start-btn-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
}

.start-btn {
    position: relative;
    background: transparent;
    border: none;
    padding: 22px 70px;
    font-size: 1.6em;
    font-weight: bold;
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    overflow: hidden;
    transition: all 0.3s;
}
.start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, #ff0080, #ff00ff, #8000ff, #0080ff, #00ffff);
    background-size: 400% 400%;
    animation: gradientShift 3s ease infinite;
    border-radius: 50px;
    z-index: -2;
}
@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.start-btn::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: rgba(0,0,0,0.85);
    border-radius: 47px;
    z-index: -1;
    transition: background 0.3s;
}
.start-btn:hover::after,
.start-btn:active::after {
    background: rgba(0,0,0,0.6);
}
.start-btn span {
    position: relative;
    z-index: 1;
    text-shadow: 0 0 20px #fff;
}
.start-btn:active { transform: scale(0.95); }

.deco-container {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: auto;
    padding-bottom: 12vh;
}
.deco-line {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, #ff00ff, #00ffff, transparent);
    animation: lineGlow 2s infinite;
}
@keyframes lineGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}
.deco-diamond {
    width: 12px; height: 12px;
    background: linear-gradient(45deg, #ff00ff, #00ffff);
    transform: rotate(45deg);
    animation: diamondSpin 4s linear infinite;
    box-shadow: 0 0 15px #ff00ff;
}
@keyframes diamondSpin {
    from { transform: rotate(45deg); }
    to { transform: rotate(405deg); }
}

/* ========== クリアバナー ========== */
.clear-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(20,0,40,0.95));
    border: 3px solid #00ffff;
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    z-index: 10000;
    animation: bannerPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    box-shadow: 0 0 60px rgba(0,255,255,0.5), inset 0 0 30px rgba(0,255,255,0.1);
}
@keyframes bannerPop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
.clear-banner-icon {
    font-size: 3em;
    animation: iconFloat 2s ease-in-out infinite;
}
.clear-banner-title {
    font-size: 1.8em;
    font-weight: 900;
    color: #00ffff;
    text-shadow: 0 0 20px #00ffff;
    margin: 10px 0 5px;
}
.clear-banner-sub {
    color: #aaa;
    font-size: 0.9em;
    margin-bottom: 15px;
}
.clear-banner-btn {
    background: linear-gradient(145deg, #00cccc, #009999);
    border: none;
    color: #fff;
    padding: 12px 35px;
    font-size: 1.1em;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,204,204,0.4);
}
.clear-banner-btn:active { transform: scale(0.95); }

/* ========== HUD ========== */
.hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 8px 12px;
    padding-left: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 10;
}
.hud-item {
    display: flex;
    align-items: center;
    gap: 5px;
    color: #fff;
    font-weight: bold;
}
.lives { font-size: 1.2em; }
.fever-gauge {
    width: 80px; height: 12px;
    background: #333;
    border-radius: 6px;
    overflow: hidden;
    border: 2px solid #666;
}
.fever-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff00ff, #ffff00, #00ffff);
    background-size: 200% 100%;
    animation: feverGradient 1s linear infinite;
    transition: width 0.3s;
}
@keyframes feverGradient {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
}
.score {
    color: #00ffff;
    font-size: 1.1em;
    text-shadow: 0 0 10px #00ffff;
}
.combo-display {
    position: absolute;
    top: 45px; right: 15px;
    color: #ffff00;
    font-size: 1.2em;
    font-weight: bold;
    text-shadow: 0 0 15px #ffff00;
}

.round-display {
    position: absolute;
    top: 45px; left: 70px;
    color: #00ff88;
    font-size: 1em;
    font-weight: bold;
    text-shadow: 0 0 10px #00ff88;
}

.pass-display {
    position: absolute;
    top: 70px; left: 70px;
    color: #888;
    font-size: 0.9em;
    font-weight: bold;
}

.timer-wrap {
    position: absolute;
    top: 40px; left: 0; right: 0;
    height: 8px;
    background: rgba(255,255,255,0.1);
}
.timer-bar {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #00ffff);
    transition: width 0.05s linear;
    box-shadow: 0 0 10px currentColor;
}
.timer-bar.warn { background: linear-gradient(90deg, #ffcc00, #ff9900); }
.timer-bar.danger {
    background: linear-gradient(90deg, #ff0044, #ff0088);
    animation: timerPulse 0.2s infinite;
}
@keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
}

#gameplay {
    background: linear-gradient(180deg, #0a0a2e 0%, #1a0a2e 100%);
}
.game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding-top: 50px;
    position: relative;
}

.fever-mode .game-area {
    animation: feverBg 0.3s infinite alternate;
}
@keyframes feverBg {
    from { background: rgba(255, 0, 255, 0.15); }
    to { background: rgba(0, 255, 255, 0.15); }
}

.round-splash {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 4em;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px #fff, 0 0 40px #00ffff, 0 0 60px #00ffff;
    z-index: 100;
    animation: splashAnim 0.6s forwards;
}
@keyframes splashAnim {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(3) rotate(-10deg); }
    40% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
}

.popup {
    position: fixed;
    top: 45%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.5em;
    font-weight: bold;
    pointer-events: none;
    z-index: 1000;
    animation: popAnim 0.5s forwards;
}
@keyframes popAnim {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
}
.popup.nice { color: #00ff88; text-shadow: 0 0 30px #00ff88; }
.popup.great { color: #00ffff; text-shadow: 0 0 30px #00ffff; }
.popup.perfect { color: #ff00ff; text-shadow: 0 0 30px #ff00ff; }
.popup.combo { color: #ffff00; text-shadow: 0 0 30px #ffff00; }
.popup.miss { color: #ff0044; text-shadow: 0 0 30px #ff0044; }
.popup.pass { color: #888888; text-shadow: 0 0 30px #888888; }
.popup.fever {
    color: #fff;
    text-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff;
    font-size: 3em;
}
.popup.clear-popup {
    color: #00ffff;
    text-shadow: 0 0 30px #00ffff, 0 0 60px #00ff88;
    font-size: 2em;
}

.flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
}
.flash.hit { animation: flashGreen 0.15s; }
.flash.miss { animation: flashRed 0.15s; }
.flash.pass { animation: flashGray 0.15s; }
@keyframes flashGreen {
    from { background: rgba(0, 255, 100, 0.4); }
    to { background: transparent; }
}
@keyframes flashRed {
    from { background: rgba(255, 0, 50, 0.4); }
    to { background: transparent; }
}
@keyframes flashGray {
    from { background: rgba(128, 128, 128, 0.3); }
    to { background: transparent; }
}

.game-btn {
    padding: 18px 40px;
    margin: 8px;
    font-size: 1.3em;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}
.game-btn:active { transform: scale(0.95); }
.game-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}
.btn-pass {
    background: linear-gradient(145deg, #666666, #444444);
    color: #ddd;
    box-shadow: 0 5px 20px rgba(100, 100, 100, 0.4);
    padding: 12px 30px;
    font-size: 1em;
}
.btn-pass:disabled {
    background: linear-gradient(145deg, #333, #222);
    color: #555;
    box-shadow: none;
}

.pass-container {
    margin-top: 15px;
    text-align: center;
}
.pass-remaining {
    color: #888;
    font-size: 0.85em;
    margin-top: 5px;
}

/* ========== 星座ゲーム専用 ========== */
.constellation-canvas {
    border-radius: 15px;
    border: 2px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 30px rgba(0,0,80,0.8), inset 0 0 50px rgba(0,0,30,0.5);
    background: radial-gradient(ellipse at center, #0a0a2e, #030308);
    max-width: 300px;
    width: 75vw;
    height: 75vw;
    max-height: 300px;
}

.question-label {
    color: #00ffff;
    font-size: 1.15em;
    font-weight: bold;
    text-shadow: 0 0 15px #00ffff;
    margin: 8px 0;
}

.hint-text {
    color: #999;
    font-size: 0.82em;
    margin-bottom: 10px;
    font-style: italic;
}

.mode-label {
    color: #ff88cc;
    font-size: 0.78em;
    font-weight: bold;
    margin-bottom: 4px;
    text-shadow: 0 0 10px #ff88cc;
    letter-spacing: 0.1em;
}

.choice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 340px;
    padding: 0 10px;
}

.choice-btn {
    background: linear-gradient(145deg, #1a1a3e, #0d0d2a);
    border: 2px solid rgba(100,100,255,0.3);
    color: #fff;
    padding: 13px 6px;
    font-size: 0.92em;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
}
.choice-btn:active:not(:disabled) {
    transform: scale(0.95);
    border-color: #00ffff;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
}
.choice-btn.correct {
    background: linear-gradient(145deg, #005533, #003322) !important;
    border-color: #00ff88 !important;
    box-shadow: 0 0 25px rgba(0,255,136,0.5) !important;
    color: #00ff88 !important;
}
.choice-btn.wrong {
    background: linear-gradient(145deg, #550022, #330011) !important;
    border-color: #ff0044 !important;
    box-shadow: 0 0 25px rgba(255,0,68,0.5) !important;
    color: #ff4466 !important;
}
.choice-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.answer-name {
    color: #00ffff;
    font-size: 1.1em;
    font-weight: bold;
    margin-top: 8px;
    text-shadow: 0 0 15px #00ffff;
    animation: popAnim 0.4s ease-out;
}

/* ========== 結果画面 ========== */
#result {
    position: relative;
    overflow: hidden;
}

#result.lose-bg {
    background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 100%);
}
#result .result-aurora {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
        radial-gradient(ellipse at 30% 30%, rgba(255,0,128,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 70%, rgba(0,255,255,0.2) 0%, transparent 50%);
    animation: loseAurora 3s ease-in-out infinite alternate;
}
@keyframes loseAurora {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

.confetti-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
}
.confetti {
    position: absolute;
    top: -20px;
    animation: confettiFall linear infinite;
}
@keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(1080deg); opacity: 0.8; }
}

.stars-container {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
}
.star {
    position: absolute;
    font-size: 1.5em;
    animation: starTwinkle 1s ease-out forwards;
}
@keyframes starTwinkle {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
}

.result-content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.result-icon-container {
    position: relative;
    margin-bottom: 20px;
}
.result-icon {
    font-size: 5em;
    animation: iconEntry 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    filter: drop-shadow(0 0 30px currentColor);
}
@keyframes iconEntry {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.icon-ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 150px; height: 150px;
    border: 3px solid rgba(0,255,255,0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: ringExpand 1.5s ease-out infinite;
}
@keyframes ringExpand {
    0% { width: 100px; height: 100px; opacity: 1; }
    100% { width: 250px; height: 250px; opacity: 0; }
}

.result-title {
    font-size: 2.2em;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 15px;
    color: #ff6688;
    text-shadow: 0 0 20px #ff0044;
}

.result-score-box {
    background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(30,30,60,0.6) 100%);
    border: 2px solid rgba(0,255,255,0.3);
    border-radius: 20px;
    padding: 20px 50px;
    margin: 15px 0;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
    animation: boxAppear 0.5s ease-out 0.3s both;
}
@keyframes boxAppear {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
.result-score-label {
    color: #888;
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    margin-bottom: 8px;
}
.result-score-value {
    font-size: 3em;
    font-weight: 900;
    color: #00ffff;
    text-shadow: 0 0 30px #00ffff;
    font-family: 'Courier New', monospace;
}

.result-stats {
    background: rgba(0,0,0,0.4);
    border-radius: 15px;
    padding: 15px 25px;
    margin: 10px 0;
    border: 1px solid rgba(255,255,255,0.1);
    animation: boxAppear 0.5s ease-out 0.5s both;
}
.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #fff;
    font-size: 1em;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    gap: 30px;
}
.stat-row:last-child { border-bottom: none; }
.stat-value {
    font-weight: bold;
    text-shadow: 0 0 10px currentColor;
}
.stat-value.cyan { color: #00ffff; }
.stat-value.gold { color: #ffd700; }
.stat-value.pink { color: #ff00ff; }
.stat-value.gray { color: #888; }
.stat-value.green { color: #00ff88; }

.result-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;

const gameNum = location.href.match(/game(\d+)/)?.[1] || '?';
document.getElementById('titleText').textContent = 'GAME ' + gameNum;
document.title = 'Game ' + gameNum;
const CLEAR_GOAL = 15;

function goBack() { window.location.href = 'index.html?menu=1'; }
function saveClear() { localStorage.setItem('gameClear_' + gameNum, 'true'); }

const hsKey = 'endlessHighScore_' + gameNum;
let highScore = parseInt(localStorage.getItem(hsKey)) || 0;
document.getElementById('best-score').textContent = highScore.toLocaleString();

// ===== パーティクル・演出生成 =====
function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 10 + 's';
        p.style.animationDuration = (8 + Math.random() * 8) + 's';
        const size = 2 + Math.random() * 5;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff0088', '#00ff88'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        p.style.background = color;
        p.style.boxShadow = `0 0 ${size * 3}px ${color}`;
        container.appendChild(p);
    }
}
createParticles();

function createConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const shapes = ['★', '✦', '⭐', '✧', '◆'];
    const colors = ['#ffd700', '#00ffff', '#ffff00', '#ff00ff', '#00ff88', '#ff8800'];
    for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        c.style.left = Math.random() * 100 + '%';
        c.style.color = colors[Math.floor(Math.random() * colors.length)];
        c.style.fontSize = (10 + Math.random() * 12) + 'px';
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.animationDelay = Math.random() * 2 + 's';
        c.style.textShadow = `0 0 10px ${c.style.color}`;
        container.appendChild(c);
    }
}

function createStars() {
    const container = document.getElementById('stars');
    container.innerHTML = '';
    for (let i = 0; i < 15; i++) {
        setTimeout(() => {
            const s = document.createElement('div');
            s.className = 'star';
            s.textContent = '✦';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.color = ['#ffd700', '#fff', '#00ffff'][Math.floor(Math.random() * 3)];
            container.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }, i * 200);
    }
}

        if (G.timeLeft <= 0) {

// ============================================================
//  ユーティリティ
// ============================================================
function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function hexToRgb(hex) {
    if (hex.length === 4) {
        hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
    }
    return {
        r: parseInt(hex.slice(1,3), 16),
        g: parseInt(hex.slice(3,5), 16),
        b: parseInt(hex.slice(5,7), 16)
    };
}

// ============================================================
//  星座選択・出題ロジック
// ============================================================
function selectConstellation() {
    let pool;
    if (G.round <= 5) {
        pool = CONSTELLATIONS.filter(c => c.difficulty === 1);
    } else if (G.round <= 12) {
        pool = CONSTELLATIONS.filter(c => c.difficulty <= 2);
    } else {
        pool = [...CONSTELLATIONS];
    }

    let available = pool.filter(c => !usedIndices.includes(CONSTELLATIONS.indexOf(c)));
    if (available.length === 0) {
        usedIndices = [];
        available = pool;
    }

    const chosen = available[Math.floor(Math.random() * available.length)];
    usedIndices.push(CONSTELLATIONS.indexOf(chosen));
    return chosen;
}

function generateChoices(correct) {
    const others = CONSTELLATIONS.filter(c => c.name !== correct.name);
    shuffle(others);

    // 同じ季節のものを優先して紛らわしくする
    const sameSeason = others.filter(c => c.season === correct.season);
    const diffSeason = others.filter(c => c.season !== correct.season);
    const ordered = [...sameSeason, ...diffSeason];

    const choices = [correct.name];
    for (const c of ordered) {
        if (choices.length >= 4) break;
        choices.push(c.name);
    }
    return shuffle(choices);
}

function getGameMode() {
    if (G.round <= 4) return 'full';          // 線＋星＋ヒント
    if (G.round <= 8) return 'no_hint';       // 線＋星のみ
    if (G.round <= 13) return 'stars_only';   // 星だけ（線なし）
    if (G.round <= 18) return 'partial';      // 一部の線のみ
    // 19ラウンド以降はランダムで高難度
    const modes = ['stars_only', 'partial', 'dim'];
    return modes[Math.floor(Math.random() * modes.length)];
}

// ============================================================
//  Canvas 描画
// ============================================================
function drawConstellation(canvas, constellation, mode) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    // ---------- 背景 ----------
    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.72);
    bg.addColorStop(0, '#0e0e30');
    bg.addColorStop(1, '#040410');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // ---------- 背景のランダム星（名前からシード生成） ----------
    let seed = 0;
    for (const ch of constellation.latin) seed += ch.charCodeAt(0);
    const sr = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

    for (let i = 0; i < 90; i++) {
        const rx = sr() * W, ry = sr() * H;
        const sz = sr() * 1.2 + 0.2;
        const al = sr() * 0.35 + 0.08;
        ctx.beginPath();
        ctx.arc(rx, ry, sz, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,200,255,${al})`;
        ctx.fill();
    }

    // ---------- 淡い星雲エフェクト ----------
    const nebX = sr() * W, nebY = sr() * H;
    const neb = ctx.createRadialGradient(nebX, nebY, 0, nebX, nebY, W * 0.35);
    const nebColors = ['rgba(60,20,80,0.12)', 'rgba(20,40,100,0.08)', 'rgba(0,0,0,0)'];
    neb.addColorStop(0, nebColors[0]);
    neb.addColorStop(0.5, nebColors[1]);
    neb.addColorStop(1, nebColors[2]);
    ctx.fillStyle = neb;
    ctx.fillRect(0, 0, W, H);

    // ---------- 座標変換 ----------
    const stars = constellation.stars;
    const specialMap = {};
    (constellation.specialStars || []).forEach(s => { specialMap[s.i] = s.color; });

    const pad = 28;
    const toX = x => pad + (x / 100) * (W - pad * 2);
    const toY = y => pad + (y / 100) * (H - pad * 2);

    // ---------- 星座線 ----------
    const drawAllLines = (mode === 'full' || mode === 'no_hint');
    const drawPartial  = (mode === 'partial');

    if (drawAllLines || drawPartial) {
        constellation.lines.forEach((line, li) => {
            if (drawPartial && li % 2 === 1) return;      // 奇数番号の線をスキップ
            const x1 = toX(stars[line[0]].x), y1 = toY(stars[line[0]].y);
            const x2 = toX(stars[line[1]].x), y2 = toY(stars[line[1]].y);

            // 外側グロー
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.strokeStyle = 'rgba(70,130,255,0.10)';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();

            // 本線
            ctx.beginPath();
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            ctx.strokeStyle = drawPartial ? 'rgba(100,160,255,0.30)' : 'rgba(100,170,255,0.50)';
            ctx.lineWidth = 1.3;
            ctx.lineCap = 'round';
            ctx.stroke();
        });
    }

    // ---------- 星 ----------
    const isDim = (mode === 'dim');

    stars.forEach((star, i) => {
        const x = toX(star.x), y = toY(star.y);
        let baseSize = Math.max(1.8, 4.8 - star.mag * 0.55);
        if (isDim) baseSize *= 0.55;

        const color = specialMap[i] || '#ffffff';
        const rgb = hexToRgb(color);

        // 外側グロー
        const glowR = baseSize * (specialMap[i] ? 7 : 4.5);
        const glow = ctx.createRadialGradient(x, y, 0, x, y, glowR);
        glow.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${isDim ? 0.12 : 0.28})`);
        glow.addColorStop(0.5, `rgba(${rgb.r},${rgb.g},${rgb.b},${isDim ? 0.04 : 0.08})`);
        glow.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
        ctx.beginPath();
        ctx.arc(x, y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // 十字フレア（明るい星だけ mag < 1）
        if (star.mag < 1 && !isDim) {
            const fl = baseSize * 4;
            ctx.globalAlpha = 0.2;
            ctx.beginPath();
            ctx.moveTo(x - fl, y); ctx.lineTo(x + fl, y);
            ctx.moveTo(x, y - fl); ctx.lineTo(x, y + fl);
            ctx.strokeStyle = color;
            ctx.lineWidth = 0.8;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // 星本体
        ctx.beginPath();
        ctx.arc(x, y, baseSize, 0, Math.PI * 2);
        ctx.fillStyle = isDim ? `rgba(${rgb.r},${rgb.g},${rgb.b},0.45)` : color;
        ctx.fill();

        // 中心ハイライト
        ctx.beginPath();
        ctx.arc(x, y, baseSize * 0.3, 0, Math.PI * 2);
        ctx.fillStyle = isDim ? 'rgba(255,255,255,0.5)' : '#fff';
        ctx.fill();
    });
}

// ============================================================
//  ゲームフロー
// ============================================================
function nextRound() {
    if (G.lives <= 0) return endGame();
    G.round++;
    updateHUD();

    // ★ クリア判定
    if (G.round >= CLEAR_GOAL && !G.cleared) {
        G.cleared = true;
        saveClear();
        showClearBanner();
        return;
    }

    // フィーバー判定
    if (G.fever >= 100 && !G.isFever) {
        G.isFever = true;
        document.getElementById('gameplay').classList.add('fever-mode');
        popup('🔥 FEVER! 🔥', 'fever');
    }

    if (G.round % 10 === 1 && G.round > 1) {
        showSplash(`🔥 ${G.round}!`, playRound, 400);
    } else {
        playRound();
    }
}

function showClearBanner() {
    const banner = document.createElement('div');
    banner.className = 'clear-banner';
    banner.innerHTML = `
        <div class="clear-banner-icon">🎊</div>
        <div class="clear-banner-title">GAME CLEAR!</div>
        <div class="clear-banner-sub">ROUND ${CLEAR_GOAL} 到達！<br>クリア記録を保存しました<br><br>ゲームオーバーまで続けよう！</div>
        <button class="clear-banner-btn" id="clearBannerBtn">▶ 続ける</button>
    `;
    document.body.appendChild(banner);

    document.getElementById('clearBannerBtn').addEventListener('click', () => {
        banner.remove();
        if (G.fever >= 100 && !G.isFever) {
            G.isFever = true;
            document.getElementById('gameplay').classList.add('fever-mode');
            popup('🔥 FEVER! 🔥', 'fever');
        }
        playRound();
    });
}

// ============================================================
//  出題処理
// ============================================================
function playRound() {
    answered = false;
    currentConstellation = selectConstellation();
    const mode = getGameMode();
    currentChoices = generateChoices(currentConstellation);

    const showHint = (mode === 'full');
    const modeLabels = {
        'full':       '⭐ 星座線＋ヒント',
        'no_hint':    '⭐ 星座線のみ',
        'stars_only': '💫 星だけ（線なし）',
        'partial':    '🌙 一部の線のみ',
        'dim':        '🌑 暗い星空',
    };

    let html = `
        <div style="text-align:center; width:100%;">
            <div class="mode-label">${modeLabels[mode]}</div>
            <div class="question-label">✨ この星座は？</div>
            <canvas class="constellation-canvas" id="star-canvas" width="300" height="300"></canvas>
            ${showHint ? `<div class="hint-text">💡 ${currentConstellation.hint}</div>` : ''}
            <div id="answer-reveal" class="answer-name" style="display:none;"></div>
            <div class="choice-grid">`;

    currentChoices.forEach((name, i) => {
        html += `<button class="choice-btn" id="choice-${i}" onclick="handleAnswer(${i})">${name}</button>`;
    });

    html += `</div>
            <div class="pass-container">
                <button class="game-btn btn-pass" onclick="handlePass()" ${G.passUsed >= G.maxPass ? 'disabled' : ''}>⏭ パス</button>
                <div class="pass-remaining">残り ${G.maxPass - G.passUsed} 回</div>
            </div>
        </div>`;

    render(html);

    // Canvas 描画（DOM挿入後）
    const canvas = document.getElementById('star-canvas');
    if (canvas) drawConstellation(canvas, currentConstellation, mode);

    startTimer(getTimeForRound(), () => {
        if (!answered) handleTimeout();
    });
}

// ============================================================
//  回答処理
// ============================================================
function handleAnswer(index) {
    if (answered) return;
    answered = true;
    stopTimer();

    const chosenName = currentChoices[index];
    const isCorrect = (chosenName === currentConstellation.name);

    // ボタンハイライト
    currentChoices.forEach((n, i) => {
        const btn = document.getElementById(`choice-${i}`);
        if (!btn) return;
        btn.disabled = true;
        if (n === currentConstellation.name) btn.classList.add('correct');
        else if (i === index && !isCorrect) btn.classList.add('wrong');
    });

    // 正解名表示
    const reveal = document.getElementById('answer-reveal');

    if (isCorrect) {
        G.combo++;
        G.totalCorrect++;
        if (G.combo > G.maxCombo) G.maxCombo = G.combo;

        const multiplier = G.isFever ? 2 : 1;
        const pts = (100 + G.combo * 25) * multiplier;
        G.score += pts;
        G.fever = Math.min(G.fever + 15, 100);

        flash('hit');
        if (G.combo >= 10) popup('🌟 AMAZING!', 'perfect');
        else if (G.combo >= 5) popup('🔥 PERFECT!', 'perfect');
        else if (G.combo >= 3) popup('GREAT!', 'great');
        else popup(`+${pts}`, 'nice');

        if (reveal) {
            reveal.style.display = 'block';
            reveal.style.color = '#00ff88';
            reveal.textContent = `✓ ${currentConstellation.name}（${currentConstellation.latin}）`;
        }

        updateHUD();
        setTimeout(nextRound, 700);
    } else {
        G.lives--;
        G.combo = 0;
        G.totalWrong++;
        G.fever = Math.max(G.fever - 30, 0);
        G.isFever = false;
        document.getElementById('gameplay').classList.remove('fever-mode');

        flash('miss');
        popup('MISS...', 'miss');

        if (reveal) {
            reveal.style.display = 'block';
            reveal.style.color = '#ff4466';
            reveal.innerHTML = `✗ 正解: <span style="color:#00ffff;">${currentConstellation.name}</span>（${currentConstellation.latin}）`;
        }

        updateHUD();
        setTimeout(() => {
            if (G.lives <= 0) endGame();
            else nextRound();
        }, 1500);
    }
}

function handleTimeout() {
    if (answered) return;
    answered = true;

    G.lives--;
    G.combo = 0;
    G.totalWrong++;
    G.fever = Math.max(G.fever - 30, 0);
    G.isFever = false;
    document.getElementById('gameplay').classList.remove('fever-mode');

    // 正解ハイライト
    currentChoices.forEach((n, i) => {
        const btn = document.getElementById(`choice-${i}`);
        if (!btn) return;
        btn.disabled = true;
        if (n === currentConstellation.name) btn.classList.add('correct');
    });

    const reveal = document.getElementById('answer-reveal');
    if (reveal) {
        reveal.style.display = 'block';
        reveal.style.color = '#ff8844';
        reveal.innerHTML = `⏰ TIME UP! 正解: <span style="color:#00ffff;">${currentConstellation.name}</span>`;
    }

    flash('miss');
    popup('TIME UP!', 'miss');
    updateHUD();

    setTimeout(() => {
        if (G.lives <= 0) endGame();
        else nextRound();
    }, 1500);
}

function handlePass() {
    if (G.passUsed >= G.maxPass || answered) return;
    answered = true;
    stopTimer();

    G.passUsed++;
    G.combo = 0;
    G.fever = Math.max(G.fever - 10, 0);

    // 正解表示
    const reveal = document.getElementById('answer-reveal');
    if (reveal) {
        reveal.style.display = 'block';
        reveal.style.color = '#888';
        reveal.textContent = `⏭ ${currentConstellation.name}（${currentConstellation.latin}）`;
    }

    flash('pass');
    popup('PASS', 'pass');
    updateHUD();

    setTimeout(nextRound, 800);
}

// ============================================================
//  結果画面
// ============================================================
function endGame() {
    stopTimer();

    const isNewHighScore = G.score > highScore;
    if (isNewHighScore) {
        highScore = G.score;
        localStorage.setItem(hsKey, highScore);
        document.getElementById('best-score').textContent = highScore.toLocaleString();
    }

    const result = document.getElementById('result');
    result.className = 'screen lose-bg';

    const clearedBadge = G.cleared ? '<div class="clear-badge">✅ GAME CLEARED!</div>' : '';
    const menuBtn = G.cleared
        ? `<button class="btn btn-green btn-small" onclick="goBack()">🎉 メニューに戻る</button>`
        : '';

    // 正答率
    const totalQ = G.totalCorrect + G.totalWrong;
    const accuracy = totalQ > 0 ? Math.round(G.totalCorrect / totalQ * 100) : 0;

    // ランク判定
    let rankIcon, rankText;
    if (G.round >= 30) { rankIcon = '👑'; rankText = '星座マスター'; }
    else if (G.round >= 20) { rankIcon = '🌟'; rankText = '星座博士'; }
    else if (G.round >= 15) { rankIcon = '⭐'; rankText = '星座愛好家'; }
    else if (G.round >= 10) { rankIcon = '🔭'; rankText = '星空観察者'; }
    else if (G.round >= 5) { rankIcon = '🌙'; rankText = '星座入門者'; }
    else { rankIcon = '💫'; rankText = '星座ビギナー'; }

    document.getElementById('result-content').innerHTML = `
        ${isNewHighScore ? '<div class="highscore-badge">🎉 NEW HIGH SCORE!</div>' : ''}
        ${clearedBadge}
        <div class="result-icon-container">
            <div class="icon-ring"></div>
            <div class="result-icon">${isNewHighScore ? '🏆' : (G.cleared ? '🎊' : rankIcon)}</div>
        </div>
        <div class="result-title" style="color:${G.cleared ? '#00ffff' : '#ff6688'}; text-shadow:0 0 20px ${G.cleared ? '#00ffff' : '#ff0044'};">
            ${G.cleared ? 'CONGRATULATIONS' : 'GAME OVER'}
        </div>
        <div style="color:#ccc; font-size:1.1em; margin-bottom:5px; text-shadow:0 0 10px rgba(255,255,255,0.3);">
            ${rankIcon} ${rankText}
        </div>
        <div class="result-score-box">
            <div class="result-score-label">Total Score</div>
            <div class="result-score-value" id="score-counter">0</div>
        </div>
        <div class="result-stats">
            <div class="stat-row">
                <span>🎯 到達ラウンド</span>
                <span class="stat-value cyan">${G.round}</span>
            </div>
            <div class="stat-row">
                <span>✅ 正答数</span>
                <span class="stat-value green">${G.totalCorrect}</span>
            </div>
            <div class="stat-row">
                <span>📊 正答率</span>
                <span class="stat-value cyan">${accuracy}%</span>
            </div>
            <div class="stat-row">
                <span>🔥 最大コンボ</span>
                <span class="stat-value gold">${G.maxCombo}</span>
            </div>
            <div class="stat-row">
                <span>⏭ パス使用</span>
                <span class="stat-value gray">${G.passUsed} / ${G.maxPass}</span>
            </div>
            <div class="stat-row">
                <span>🏆 ハイスコア</span>
                <span class="stat-value pink">${highScore.toLocaleString()}</span>
            </div>
        </div>
        <div class="result-buttons">
            <button class="btn" onclick="startGame()">🔄 RETRY</button>
            ${menuBtn}
            <button class="btn btn-cyan btn-small" onclick="showScreen('title')">🏠 TITLE</button>
        </div>
    `;

    showScreen('result');

    // スコアカウントアップ
    let current = 0;
    const target = G.score;
    const duration = 1500;
    const step = target / (duration / 16);
    const counter = document.getElementById('score-counter');
    const countUp = setInterval(() => {
        current += step;
        if (current >= target) {
            current = target;
            clearInterval(countUp);
        }
        counter.textContent = Math.floor(current).toLocaleString();
    }, 16);

    if (isNewHighScore || G.cleared) {
        createConfetti();
        createStars();
    }
}
</script>
</body>
</html>
